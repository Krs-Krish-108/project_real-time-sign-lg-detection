services:
  - type: web
    name: rtdm-backend
    runtime: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # Set this manually in Render dashboard to your Vercel URL
                      # e.g. https://your-app.vercel.app
