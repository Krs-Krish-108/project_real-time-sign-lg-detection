services:
  - type: web
    name: rtdm-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # Set this manually in Render dashboard to your Vercel URL
                      # e.g. https://your-app.vercel.app
