name: CI — Frontend & Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: typecheck + build (Vercel handles actual deploy) ────────────────
  frontend:
    name: Frontend (Vite / React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Use a placeholder URL during CI build validation
          VITE_API_URL: https://placeholder-backend.onrender.com

  # ── Backend: lint + syntax check (Render handles actual deploy) ───────────────
  backend:
    name: Backend (FastAPI / Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check syntax
        run: python -m py_compile app.py && echo "Syntax OK"
